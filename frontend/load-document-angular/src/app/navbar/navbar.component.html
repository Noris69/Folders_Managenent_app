<!-- navbar.component.html -->
<div class="container-fluid shadow-sm bg-white">
    <nav class="navbar navbar-expand-lg navbar-light px-4 py-3">
        <a class="navbar-brand fw-bold fs-3 text-primary" routerLink="/">Doc</a>

        <button class="navbar-toggler border-0" type="button" (click)="toggleMenu()" aria-controls="navbarNav"
            [attr.aria-expanded]="isMenuOpen" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" [class.show]="isMenuOpen" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center gap-3">
                <li class="nav-item">
                    <a class="nav-link fw-semibold text-dark" routerLink="/home" routerLinkActive="active"
                        (click)="closeMenu()">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-semibold text-dark" routerLink="/login" routerLinkActive="active"
                        (click)="closeMenu()">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-semibold text-dark" routerLink="/register" routerLinkActive="active"
                        (click)="closeMenu()">Register</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-semibold text-dark" routerLink="/admin" routerLinkActive="active"
                        (click)="closeMenu()">Admin</a>
                </li>
                <li class="nav-item">
                    <button class="btn btn-danger btn-sm rounded-pill px-3 py-1 ms-3" (click)="logout()"
                        title="Se déconnecter">
                        Déconnexion
                    </button>
                </li>
            </ul>
        </div>
    </nav>
</div>
