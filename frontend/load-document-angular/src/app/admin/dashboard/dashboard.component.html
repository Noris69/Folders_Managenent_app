<div class="container" style="max-width: 700px; margin-top: 30px;">
    <app-navbar></app-navbar>

    <h2 class="mb-4">Gestion des utilisateurs</h2>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="mb-4">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="name">Nom complet</label>
                <input id="name" type="text" formControlName="name" class="form-control" />
                <div *ngIf="userForm.get('name')?.invalid && userForm.get('name')?.touched" class="text-danger">
                    Le nom est requis.
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label for="email">Email</label>
                <input id="email" type="email" formControlName="email" class="form-control" />
                <div *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched" class="text-danger">
                    Email invalide.
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label for="password">Mot de passe <small>(laisser vide si pas modification)</small></label>
                <input id="password" type="password" formControlName="password" class="form-control" />
                <div *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched" class="text-danger">
                    Mot de passe min. 6 caractères.
                </div>
            </div>
            
        </div>

        <button type="submit" class="btn btn-primary">
            {{ editingUser ? 'Modifier' : 'Ajouter' }}
        </button>
        <button *ngIf="editingUser" type="button" (click)="cancelEdit()" class="btn btn-secondary ms-2">Annuler</button>
    </form>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Email</th>
                <th>Rôle</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let user of users">
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.role }}</td>
                <td>
                    <button class="btn btn-sm btn-warning me-2" (click)="editUser(user)">Modifier</button>
                    <button class="btn btn-sm btn-danger" (click)="deleteUser(user)">Supprimer</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
